name: Compile iOS IPA (TrollStore)

on:
  push:
    branches: [ master, NET10 ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-26
    
    steps:
    - uses: actions/checkout@v6
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        global-json-file: global.json

    - name: Install Platform Workloads
      run: dotnet workload install ios macos android

    - name: Restore workloads
      run: dotnet workload restore

    - name: Restore dependencies
      run: dotnet restore GalaxyBudsClient.iOS/GalaxyBudsClient.iOS.csproj --configfile GalaxyBudsClient/nuget.config -p:IsiOS=true

    - name: Publish iOS App
      run: |
        dotnet publish GalaxyBudsClient.iOS/GalaxyBudsClient.iOS.csproj \
          -f net10.0-ios \
          -c Release \
          -r ios-arm64 \
          --no-restore \
          --self-contained \
          -p:IsiOS=true \
          -p:MtouchLink=None \
          -p:UseInterpreter=true \
          -p:MtouchInterpreter=all \
          -p:CodesignEntitlements="Entitlements.plist" \
          /p:BuildIpa=true \
          /p:EnableCodeSigning=true \
          /p:CodesignKey="-" \
          /p:CodesignProvision=""

    - name: Prepare IPA for Upload (TrollStore)
      run: |
        # 寻找系统生成的 IPA，如果不存在则手动打包
        IPA_PATH=$(find ./GalaxyBudsClient.iOS/bin -name "*.ipa" -type f | head -n 1)
        if [ -f "$IPA_PATH" ]; then
          echo "Using system generated IPA: $IPA_PATH"
          cp "$IPA_PATH" GalaxyBudsClient_iOS_TrollStore.ipa
        else
          echo "System IPA not found, manual packaging..."
          mkdir -p Payload
          APP_PATH=$(find ./GalaxyBudsClient.iOS/bin -name "*.app" -type d | head -n 1)
          cp -r "$APP_PATH" Payload/
          zip -r GalaxyBudsClient_iOS_TrollStore.ipa Payload
        fi
        
    - name: Upload IPA artifact
#       GitHub Actions runner currently doesn't easily support v6 for everything, using v4 for compatibility if needed, but v6 is latest
      uses: actions/upload-artifact@v6
      with:
        name: GalaxyBudsClient_iOS_IPA
        path: GalaxyBudsClient_iOS_TrollStore.ipa
